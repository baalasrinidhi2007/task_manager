<!-- force update -->
<!DOCTYPE html>
<html>
<head>
    <title>Smart Task Manager</title>
   <style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Animated gradient glow */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #00c6ff, transparent);
    top: -100px;
    left: -100px;
    filter: blur(120px);
    animation: move 10s infinite alternate;
}

body::after {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #ff6ec4, transparent);
    bottom: -100px;
    right: -100px;
    filter: blur(120px);
    animation: move 12s infinite alternate-reverse;
}

@keyframes move {
    from { transform: translate(0,0); }
    to { transform: translate(100px, 100px); }
}

/* Glass card */
.app {
    position: relative;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    padding: 20px;
    border-radius: 20px;
    width: 360px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    color: white;
    z-index: 1;
}

h1 {
    text-align: center;
    margin-bottom: 15px;
}

.input-section {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

input::placeholder {
    color: #ccc;
}

button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

/* Gradient button */
.add-btn {
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
}

.add-btn:hover {
    transform: scale(1.05);
}

/* Filters */
.filters {
    margin-top: 15px;
    text-align: center;
}

.filters button {
    margin: 3px;
    background: rgba(255,255,255,0.1);
    color: white;
}

.filters button.active {
    background: linear-gradient(45deg, #00c6ff, #0072ff);
}

/* Tasks */
.task {
    background: rgba(255,255,255,0.08);
    margin-top: 10px;
    padding: 12px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.2s;
}

.task:hover {
    transform: scale(1.02);
}

.task span {
    cursor: pointer;
}

.done {
    text-decoration: line-through;
    color: #aaa;
}

.actions button {
    margin-left: 5px;
    background: rgba(255,255,255,0.15);
    color: white;
}

.actions button:hover {
    background: rgba(255,255,255,0.3);
}
</style>
</head>
<body>

<div class="app">
    <h1>🧠 Task Manager</h1>

    <div class="input-section">
        <input id="taskInput" placeholder="Add a task...">
        <button class="add-btn" onclick="addTask()">+</button>
    </div>

    <div class="filters">
        <button onclick="setFilter('all')" class="active">All</button>
        <button onclick="setFilter('active')">Active</button>
        <button onclick="setFilter('done')">Completed</button>
    </div>

    <div id="taskList"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function setFilter(type) {
    filter = type;

    document.querySelectorAll(".filters button").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");

    displayTasks();
}

function displayTasks() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {

        if (filter === "active" && task.done) return;
        if (filter === "done" && !task.done) return;

        let div = document.createElement("div");
        div.className = "task";

        let text = document.createElement("span");
        text.innerText = task.text;
        if (task.done) text.classList.add("done");

        text.onclick = () => {
            tasks[index].done = !tasks[index].done;
            saveTasks();
            displayTasks();
        };

        let actions = document.createElement("div");
        actions.className = "actions";

        let del = document.createElement("button");
        del.innerText = "🗑";
        del.onclick = () => {
            tasks.splice(index, 1);
            saveTasks();
            displayTasks();
        };

        actions.appendChild(del);

        div.appendChild(text);
        div.appendChild(actions);

        list.appendChild(div);
    });
}

function addTask() {
    let input = document.getElementById("taskInput");

    if (input.value.trim() === "") return;

    tasks.push({ text: input.value, done: false });

    input.value = "";

    saveTasks();
    displayTasks();
}

displayTasks();
</script>

</body>
</html>
